server {
    listen 80;
    server_name UNV360.zlabs.com.br;

    # Root directory (ajuste para o caminho correto na sua VPS)
    root /var/www/unv360/dist;
    index index.html;

    # Gzip para melhor performance
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml;
    gzip_disable "MSIE [1-6]\.";

    location / {
        # Tenta servir o arquivo, depois o diretório, e se não encontrar, manda pro index.html
        # Isso é essencial para que as rotas do React (SPA) funcionem
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }

    # Bloquear acesso a arquivos ocultos
    location ~ /\. {
        deny all;
    }
}
